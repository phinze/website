server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Try exact path, then directory index, then .html extension (for
        # Jekyll pages like /writing/ -> writing.html), then 404.
        try_files $uri $uri/index.html @htmlext;
    }

    location @htmlext {
        # Strip trailing slash and try .html
        rewrite ^/(.+)/$ /$1.html last;
        return 404;
    }

    error_page 404 /404.html;
}
